name: Docs Check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  links:
    name: Validate markdown links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check doc links
        run: cargo run --bin check-doc-links
