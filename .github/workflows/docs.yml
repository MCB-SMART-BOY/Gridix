name: Docs Check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  links:
    name: Validate markdown links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check local doc links
        run: python scripts/check_doc_links.py
