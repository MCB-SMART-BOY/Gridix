name: Build Cross-Platform

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev
        
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../gridix-${{ matrix.name }}.tar.gz gridix
        
      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../gridix-${{ matrix.name }}.tar.gz gridix
          
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/gridix.exe" -DestinationPath "gridix-${{ matrix.name }}.zip"
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gridix-${{ matrix.name }}
          path: gridix-${{ matrix.name }}.*
