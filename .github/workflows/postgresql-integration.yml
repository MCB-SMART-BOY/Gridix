name: PostgreSQL Integration

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1' # Every Monday 04:00 UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  postgresql-cancel-tests:
    name: PostgreSQL Cancel Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: gridix
          POSTGRES_USER: gridix
          POSTGRES_DB: gridix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U gridix -d gridix_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      GRIDIX_IT_PG_HOST: 127.0.0.1
      GRIDIX_IT_PG_PORT: "5432"
      GRIDIX_IT_PG_USER: gridix
      GRIDIX_IT_PG_PASSWORD: gridix
      GRIDIX_IT_PG_DB: gridix_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev

      - name: Run PostgreSQL integration tests
        run: cargo test --test postgresql_cancel_integration -- --ignored --nocapture
